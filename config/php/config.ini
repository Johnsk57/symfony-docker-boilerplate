; ========================================
; ⚙️  CONFIG + PERF SYMFONY DOCKER - DEV
; ========================================

; 🔍 Erreurs COMPLÈTES (Symfony)
error_reporting = E_ALL
log_errors = On
display_errors = On
display_startup_errors = On
log_errors_max_len = 0

; 🌍 Timezone France
date.timezone = Europe/Paris

; 🔐 Sessions sécurisées Symfony
session.cookie_httponly = On
session.cookie_secure = On
session.use_strict_mode = 1
session.auto_start = Off

; 🛡️  Sécurité
expose_php = Off

; ========================================
; ⚡ OPCache = +70% perf pages/console
; ========================================
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 2           ; DEV: check fichiers modifiés
opcache.validate_timestamps = 1       ; DEV: recompilation auto
opcache.save_comments = 1

; ========================================
; 🐛 XDEBUG (optimisé - désactivé par défaut)
; ========================================
[xdebug]
xdebug.mode = off                    ; PROD/TEST
; xdebug.mode = debug                 ; DEV: décommentez
; xdebug.start_with_request = yes
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
; xdebug.log_level = 0
