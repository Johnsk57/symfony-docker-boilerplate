# =====================================================
# 🐘 pgAdmin PROXY - https://pgadmin.localhost
# =====================================================
#
# FEATURES :
# ✅ HTTPS + HTTP redirect (301)
# ✅ Proxy sécurisé → pgAdmin conteneur (port 80)
# ✅ SSL offload (Apache SSL → HTTP interne)
# ✅ Logs dédiés pgAdmin
# ✅ Docker DNS intégré (pgadmin → sister container)
# =====================================================

# =====================================================
# 🔒 HTTPS pgAdmin (proxy interne)
# =====================================================
<VirtualHost *:443>
    ServerName pgadmin.localhost

    # SSL dev self-signed
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/local/selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/certs/local/selfsigned.key

    # 🔌 PROXY → pgAdmin Docker (http://pgadmin:80)
    # pgadmin → Docker service (compose DNS)
    SSLProxyEngine on
    # Dev : ignore certs internes
    SSLProxyVerify none
    # Pas de CN check Docker
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off

    # Headers auth pgAdmin préservés
    ProxyPreserveHost On
    ProxyPass / http://pgadmin:80/
    ProxyPassReverse / http://pgadmin:80/

    # 📊 Logs séparés
    ErrorLog ${APACHE_LOG_DIR}/pgadmin_error.log
    CustomLog ${APACHE_LOG_DIR}/pgadmin_access.log combined
</VirtualHost>

# =====================================================
# 🔄 HTTP → HTTPS REDIRECT (301)
# =====================================================
<VirtualHost *:80>
    ServerName pgadmin.localhost

    # Force HTTPS (sécurité + SEO)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>