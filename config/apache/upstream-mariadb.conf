# =====================================================
# 🔌 phpMyAdmin PROXY - https://phpmyadmin.localhost
# =====================================================
#
# FEATURES :
# ✅ HTTPS + HTTP redirect (301)
# ✅ Proxy sécurisé vers phpMyAdmin conteneur (port 80)
# ✅ SSL offload (Apache SSL → HTTP interne)
# ✅ Logs dédiés (debug facile)
# ✅ Non-root proxy (sécurité)
# =====================================================

# =====================================================
# 🔒 HTTPS phpMyAdmin (proxy interne)
# =====================================================
<VirtualHost *:443>
    ServerName phpmyadmin.localhost

    # SSL dev (self-signed mkcert)
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/local/selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/certs/local/selfsigned.key

    # 🔄 PROXY vers phpMyAdmin Docker (http://phpmyadmin:80)
    # Docker DNS : phpmyadmin → conteneur sister
    SSLProxyEngine on
    # Dev : ignore certs conteneurs internes
    SSLProxyVerify none
    # Pas de CN check Docker interne
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off

    # Headers originaux préservés (auth Symfony)
    ProxyPreserveHost On
    ProxyPass / http://phpmyadmin:80/
    ProxyPassReverse / http://phpmyadmin:80/

    # 📊 Logs dédiés
    ErrorLog ${APACHE_LOG_DIR}/phpmyadmin_error.log
    CustomLog ${APACHE_LOG_DIR}/phpmyadmin_access.log combined
</VirtualHost>

# =====================================================
# 🚀 HTTP → HTTPS REDIRECT (301)
# =====================================================
<VirtualHost *:80>
    ServerName phpmyadmin.localhost

    # SEO + sécurité : force HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>
