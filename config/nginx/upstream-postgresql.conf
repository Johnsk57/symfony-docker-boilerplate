# =====================================================
# 🐘 pgAdmin PROXY - https://pgadmin.localhost
# =====================================================
#
# FEATURES :
# ✅ HTTPS + HTTP 301 redirect
# ✅ Proxy sécurisé → pgAdmin Docker (port 80)
# ✅ Headers proxy complets (auth pgAdmin)
# ✅ SSL offload Nginx → HTTP interne
# ✅ Docker DNS (pgadmin → sister container)
# =====================================================

# =====================================================
# 🔒 HTTPS pgAdmin Proxy
# =====================================================
server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    server_name pgadmin.localhost;

    location / {
        proxy_pass http://pgadmin:80/;  # 🎯 Docker service pgadmin
        proxy_set_header Host $host;                    # Auth pgAdmin
        proxy_set_header X-Real-IP $remote_addr;        # IP client réel
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;       # HTTPS détecté
        proxy_buffering off;                            # pgAdmin streaming
        proxy_read_timeout 300s;                        # Sessions longues
        # 💡 Headers pgAdmin 4 obligatoires
    }
}

# =====================================================
# 🔄 HTTP → HTTPS REDIRECT (301)
# =====================================================
server {
    listen 80;
    server_name pgadmin.localhost;
    return 301 https://$host$request_uri;  # 🎯 Sécurité + SEO
}
