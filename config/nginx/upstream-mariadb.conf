# =====================================================
# 🗄️ phpMyAdmin PROXY - https://phpmyadmin.localhost
# =====================================================
#
# FEATURES :
# ✅ HTTPS + HTTP 301 redirect
# ✅ Proxy sécurisé → phpMyAdmin Docker (port 80)
# ✅ Headers proxy complets (auth + IP)
# ✅ SSL offload Nginx → HTTP interne
# ✅ Logs dédiés (debug facile)
# =====================================================

# =====================================================
# 🔒 HTTPS phpMyAdmin Proxy
# =====================================================
server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    server_name phpmyadmin.localhost;

    location / {
        proxy_pass http://phpmyadmin:80/;  # 🎯 Docker service
        proxy_set_header Host $host;                    # Auth phpMyAdmin
        proxy_set_header X-Real-IP $remote_addr;        # IP client réel
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;       # HTTPS détecté
        # 💡 Headers obligatoires phpMyAdmin
    }
}

# =====================================================
# 🔄 HTTP → HTTPS REDIRECT (301)
# =====================================================
server {
    listen 80;
    server_name phpmyadmin.localhost;
    return 301 https://$host$request_uri;  # 🎯 SEO + sécurité
}
